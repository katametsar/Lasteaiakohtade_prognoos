services:
  postgres:
    image: postgres:16
    container_name: lasteaiakohad_postgres
    environment:
      POSTGRES_DB: lasteaiakohad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lasteaiakohad"]
      interval: 5s
      timeout: 5s
      retries: 10

  superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    container_name: lasteaiakohad_superset
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: "change-this-secret-key"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_FIRSTNAME: Admin
      ADMIN_LASTNAME: User
      ADMIN_EMAIL: admin@example.com
      ##järgmise rea lisasin mina, Miina
      SUPERSET_FEATURE_ENABLE_DATABASE_DRIVERS: "postgresql"
    ports:
      - "8089:8088"
    volumes:
      - superset_home:/app/superset_home
    command: >
      /bin/bash -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "

volumes:
  postgres_data:
  superset_home:
